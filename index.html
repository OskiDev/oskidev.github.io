<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oscar Barclay | Portfolio</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<video autoplay muted loop id="bg">
    <source src="assets/background-1.mp4" type="video/mp4" />
</video>

<div class="wrap">
    <header class="topbar">
        <div style="display:flex; align-items:center; gap:16px;">
            <img src="assets/pfp.png" style="width:90px; height:90px; border-radius:50%; object-fit:cover;"  alt=""/>
            <div style="display:flex; flex-direction:column; gap:6px; align-items: stretch;">
                <h1 class="name" style="text-align: center">Oscar <em>Barclay</em></h1>
                <div style="border-top:0.5px solid #3a2558;"></div>
                <span style="font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:#7a5fa0; text-align: center">Gameplay and AI Programmer</span>
            </div>
        </div>
        <div class="social">
            <a href="https://github.com/OskiDev" target="_blank">
                <img src="assets/github.png" style="width:50px; height:50px; opacity:1; transition:opacity 0.15s;" onmouseover="this.style.opacity=0.5" onmouseout="this.style.opacity=1"  alt=""/>
            </a>
            <a href="https://www.linkedin.com/in/oscar-barclay-257721404/" target="_blank">
                <img src="assets/linkedin.png" style="width:50px; height:50px; opacity:1; transition:opacity 0.15s;" onmouseover="this.style.opacity=0.5" onmouseout="this.style.opacity=1"  alt=""/>
            </a>
        </div>
    </header>
    
    <div class="meta-row">
        <div class="filters" style="margin-left: auto; margin-right: auto;">
            <span class="filter active" data-filter="all">All</span>
            <span class="filter" data-filter="ue5">Unreal Engine 5</span>
            <span class="filter" data-filter="cpp">C++</span>
            <span class="filter" data-filter="bps">Blueprints</span>
            <span class="filter" data-filter="network">Networking</span>
        </div>
    </div>

    <div class="grid" id="grid"></div>
        
    <footer class="footer">
        <span class="copy" style="text-align: end; margin-left: auto;">© 2026 Oscar Barclay</span>
    </footer>

</div>

<script>
</script>

<script src="main.js"></script>

</body>
</html>
